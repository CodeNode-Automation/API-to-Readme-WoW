name: Update WoW Character Data

on:
  schedule:
    # Runs at 11:00 UTC (12:00 PM CET) and 23:00 UTC (12:00 AM CET)
    - cron: '0 11,23 * * *'
  workflow_dispatch:

jobs:
  auto-update-wow-data:
    runs-on: ubuntu-latest
    
    # We need to give the Action permission to push code back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python Script
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all Python files, assets (SVGs, history.json, timeline.json), and the HTML page
          git add *.py wow/*.py render/*.py asset/* index.html
          
          # Only commit if there are actually changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update WoW character data" && git push)