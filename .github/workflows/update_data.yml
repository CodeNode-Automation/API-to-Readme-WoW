name: Update WoW Character Data

on:
  schedule:
    # 23:00 UTC is 00:00 CET (Midnight in Germany during Winter/Standard time)
    # Note: During Summer time (CEST), this will run at 01:00 AM local time.
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    # We need to give the Action permission to push code back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run Python Script
        env:
          BLIZZARD_CLIENT_ID: ${{ secrets.BLIZZARD_CLIENT_ID }}
          BLIZZARD_CLIENT_SECRET: ${{ secrets.BLIZZARD_CLIENT_SECRET }}
        run: python update_readme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *_ui.svg
          # Only commit if there are actually changes to the SVG
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update WoW character data" && git push)